---
layout: default
---
<article class="container post-content">
    <div class="hero" style="padding-bottom: 24px;">
        <h1>{{ page.title }}</h1>
        <p class="post-meta">
            {{ page.date | date: "%B %d, %Y" }} &nbsp;·&nbsp;
            {% if page.categories %}{{ page.categories | join: ", " }}{% endif %}
            <div class="post-tags">{% for tag in page.tags %}<span>#{{ tag }}</span>{% endfor %}</div>
        </p>
    </div>

    {{ content }}
</article>
