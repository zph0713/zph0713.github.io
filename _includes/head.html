<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title | default: site.title }} — {{ site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">

<link rel="icon" href="/favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="{{ "/css/cyberpunk.css" | relative_url }}">
<link rel="stylesheet" href="{{ "/css/syntax.css" | relative_url }}">

{% if page.categories %}<meta name="keywords" content="{% for c in page.categories %}{{ c }}{% unless forloop.last %},{% endunless %}{% endfor %}">{% endif %}
{% if page.tags %}<meta name="tags" content="{{ page.tags | join: ', ' }}">{% endif %}

<!-- Open Graph -->
<meta property="og:title" content="{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
{% if page.image %}<meta property="og:image" content="{{ page.image | absolute_url }}">{% endif %}

<!-- RSS Feed -->
<link href="{{ "/feed.xml" | relative_url }}" type="application/atom+xml" rel="alternate" title="Feed for {{ site.title }}">
